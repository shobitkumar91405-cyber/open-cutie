<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Little Note For You 💗 - From Sivasingh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@700;900&display=swap');
        
        body {
            background: linear-gradient(180deg, #10001a 0%, #000000 100%);
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
            margin: 0;
            padding: 0;
            color: white;
            user-select: none; /* Prevents text selection while holding */
        }
        
        .slide {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: opacity 0.8s ease;
            opacity: 0;
        }
        
        .slide.active {
            display: flex;
            opacity: 1;
        }
        
        .neon-text {
            text-shadow: 0 0 10px #ff00cc, 0 0 20px #ff00cc, 0 0 40px #ff69b4;
        }
        
        .glow-button {
            transition: all 0.3s ease;
            box-shadow: 0 0 30px #ff00cc;
        }
        
        .glow-button:active {
            transform: scale(0.95);
        }
        
        /* 🌌 SOLAR SYSTEM ORBIT ANIMATIONS (Sour Mandal Effect) 🌌 */
        .solar-system {
            position: relative;
            width: 150px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 40px auto 80px auto;
        }

        .sun-heart {
            font-size: 80px;
            z-index: 10;
            color: #ff00cc;
            text-shadow: 0 0 40px #ff00cc, 0 0 80px #ff1493;
            animation: pulseHeart 1.5s infinite alternate;
            transition: transform 0.5s ease;
        }

        @keyframes pulseHeart {
            0% { transform: scale(1); text-shadow: 0 0 30px #ff00cc; }
            100% { transform: scale(1.15); text-shadow: 0 0 60px #ff69b4; }
        }

        .orbit {
            position: absolute;
            border: 1px dashed rgba(255, 105, 180, 0.3);
            border-radius: 50%;
            animation: spin linear infinite;
        }

        .orbit-1 { width: 220px; height: 220px; animation-duration: 8s; }
        .orbit-2 { width: 320px; height: 320px; animation-duration: 12s; animation-direction: reverse; }
        .orbit-3 { width: 420px; height: 420px; animation-duration: 18s; }

        .planet {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            text-shadow: 0 0 10px white;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Floating background stars */
        .bg-star {
            position: absolute;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px white;
            animation: twinkle 3s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        /* Envelope / Note Card */
        .envelope-btn {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            color: #d81b60;
            box-shadow: 0 10px 30px rgba(255, 20, 147, 0.4);
            border: 3px solid white;
        }

        /* Video Container */
        #videoContainer {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            background: black;
            z-index: 100;
            align-items: center; justify-content: center;
        }
        video { width: 100%; max-width: 500px; height: auto; border-radius: 20px; outline: none; }

        /* Confetti Blast Elements */
        .confetti {
            position: absolute;
            width: 15px; height: 15px;
            border-radius: 50%;
            z-index: 90;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="tere-liye.mp3" type="audio/mpeg">
    </audio>

    <div id="stars-container" class="fixed top-0 left-0 w-full h-full pointer-events-none z-0"></div>

    <div id="slide1" class="slide active relative z-20">
        <div class="text-center px-6 max-w-md">
            <img src="gif5.gif" class="w-64 h-64 mx-auto mb-8 object-contain rounded-full shadow-[0_0_50px_#ff00cc]" alt="Cute GIF 1">
            <h1 class="text-6xl text-pink-400 mb-4" style="font-family: 'Dancing Script', cursive;">Hey cutiepie</h1>
            <p class="text-2xl mb-12 font-bold tracking-wide">Do you even know how cute you are?</p>
            <button onclick="startExperience()" 
                 class="glow-button bg-pink-500 hover:bg-pink-400 text-white text-xl font-bold py-4 px-12 rounded-full mx-auto inline-block">
                let's check 🥺🥺
            </button>
        </div>
    </div>

    <div id="slide2" class="slide relative z-20">
        <div class="text-center px-6 max-w-md w-full">
            <h1 class="text-4xl font-black mb-4 tracking-wide">How important are you to me?</h1>
            <p class="text-gray-400 text-sm mb-10 tracking-widest uppercase">Hold the button to find out</p>
            
            <div class="solar-system mb-16">
                <div class="orbit orbit-1"></div>
                <div class="sun-heart" id="holdHeart">💖</div>
            </div>

            <button id="holdBtn" 
                 class="glow-button bg-gradient-to-r from-purple-600 to-pink-500 text-white text-xl font-bold py-4 px-16 rounded-full w-full max-w-[250px] mx-auto select-none">
                Press and Hold
            </button>
            <div id="holdProgress" class="h-1 bg-pink-500 w-0 mt-4 mx-auto transition-all duration-100 max-w-[250px] rounded"></div>
        </div>
    </div>

    <div id="slide3" class="slide relative z-20">
        <div class="text-center px-6 max-w-md">
            <div class="solar-system mb-10">
                <div class="orbit orbit-1"><div class="planet">⭐</div></div>
                <div class="orbit orbit-2"><div class="planet">💗</div></div>
                <div class="orbit orbit-3"><div class="planet">✨</div></div>
                <div class="sun-heart text-[100px]">💗</div>
            </div>

            <h1 class="text-4xl font-black mb-6">You are my <span class="text-pink-500">universe</span>.</h1>
            <p class="text-2xl font-bold mb-10">You mean more to me than you know.</p>
            
            <button onclick="nextSlide()" 
                 class="bg-pink-900/50 border border-pink-500 text-pink-300 text-xl font-bold py-3 px-10 rounded-full mx-auto flex items-center gap-2">
                Hug sent! 💗
            </button>
        </div>
    </div>

    <div id="slide4" class="slide relative z-20">
        <div class="text-center px-6 max-w-md relative h-64 flex items-center justify-center w-full">
            <div class="absolute top-10 left-10 text-yellow-300 text-6xl drop-shadow-[0_0_20px_yellow] animate-pulse">⭐</div>
            <div class="absolute bottom-10 right-20 text-yellow-300 text-5xl drop-shadow-[0_0_20px_yellow] animate-bounce">⭐</div>
            <h1 class="text-5xl font-black tracking-widest">You show up.</h1>
        </div>
        <button onclick="nextSlide()" class="mt-12 text-white/50 text-xl animate-pulse">Tap anywhere to continue...</button>
    </div>

    <div id="slide5" class="slide relative z-20">
        <div class="text-center px-6 max-w-md w-full">
            <h1 class="text-5xl text-white mb-12" style="font-family: 'Dancing Script', cursive;">A little note for you</h1>
            
            <button onclick="nextSlide()" 
                 class="envelope-btn w-full max-w-[300px] h-40 rounded-3xl mx-auto flex flex-col items-center justify-center gap-2 cursor-pointer transition-transform hover:scale-105 active:scale-95">
                <div class="w-16 h-16 bg-pink-500 rounded-full flex items-center justify-center text-white text-3xl shadow-lg mb-2">
                    💌
                </div>
                <span class="font-bold text-xl">Tap to open</span>
            </button>
        </div>
    </div>

    <div id="slide6" class="slide bg-[#1a001f] relative z-20">
        <div class="text-center px-6 max-w-md relative z-20">
            <img src="gif7.gif" class="mx-auto mb-8 w-48 h-48 rounded-full border-4 border-pink-400 shadow-[0_0_30px_#ff69b4] object-cover" alt="Cute GIF 7">
            
            <h1 class="text-5xl text-pink-400 mb-10 leading-tight" style="font-family: 'Dancing Script', cursive;">
                Will you be my Girlfriend? 🥺❤️
            </h1>
            
            <div class="flex flex-col items-center gap-6">
                <button onclick="blastAndSayYes()" id="yesBtn" class="glow-button bg-gradient-to-r from-red-600 to-pink-500 text-white text-3xl font-black py-5 px-16 rounded-full shadow-2xl w-full">
                    YES! 💍❤️
                </button>
                
                <button onclick="clickNo()" id="noBtn" class="bg-gray-800 text-gray-400 text-xl font-bold py-3 px-10 rounded-full">
                    No 🙈
                </button>
            </div>
        </div>
    </div>

    <div id="slide7" class="slide relative z-20 bg-black">
        <div class="text-center px-6 max-w-md relative z-20">
            <div class="text-8xl mb-6">🎉💖🥳</div>
            <h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-red-500 to-yellow-500 mb-4 neon-text">
                Finally!
            </h1>
            <h2 class="text-4xl font-bold mb-12">She said YES! 🥹❤️</h2>
            
            <button onclick="openVideo()" class="glow-button bg-pink-600 text-white text-2xl font-bold py-5 px-10 rounded-full shadow-[0_0_40px_#ff00cc] animate-bounce">
                Open Your Surprise 🎁
            </button>
        </div>
    </div>

    <div id="videoContainer">
        <video id="finalVideo" controls playsinline>
            <source src="video1.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <button onclick="closeVideo()" class="absolute top-10 right-10 text-white text-2xl font-bold bg-black/50 w-12 h-12 rounded-full">X</button>
    </div>

    <script>
        let currentSlide = 1;
        const totalSlides = 7;
        let bgMusic = document.getElementById("bgMusic");

        // Generate Background Stars
        function createStars() {
            const container = document.getElementById('stars-container');
            for(let i=0; i<50; i++) {
                let star = document.createElement('div');
                star.className = 'bg-star';
                star.style.width = Math.random() * 3 + 'px';
                star.style.height = star.style.width;
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                star.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(star);
            }
        }
        createStars();

        // Slide Navigation
        function showSlide(n) {
            document.querySelectorAll('.slide').forEach(slide => slide.classList.remove('active'));
            document.getElementById('slide' + n).classList.add('active');
        }

        function nextSlide() {
            if (currentSlide < totalSlides) {
                currentSlide++;
                showSlide(currentSlide);
            }
        }

        // Start Experience (Audio + Next Slide)
        function startExperience() {
            bgMusic.play().catch(e => console.log("Audio autoplay prevented"));
            nextSlide();
        }

        // "Hold the Button" Logic for Slide 2
        let holdTimer;
        let progressInterval;
        let progress = 0;
        const holdBtn = document.getElementById('holdBtn');
        const holdHeart = document.getElementById('holdHeart');
        const progressBar = document.getElementById('holdProgress');

        function startHold(e) {
            e.preventDefault(); // Prevent text selection on mobile
            holdHeart.style.transform = 'scale(1.5)';
            holdHeart.style.textShadow = '0 0 80px #ff00cc, 0 0 120px white';
            
            progress = 0;
            progressBar.style.width = '0%';
            
            progressInterval = setInterval(() => {
                progress += 5; // Fill up over ~2 seconds (20 * 100ms)
                progressBar.style.width = progress + '%';
            }, 100);

            holdTimer = setTimeout(() => {
                clearInterval(progressInterval);
                nextSlide();
            }, 2000);
        }

        function endHold() {
            clearTimeout(holdTimer);
            clearInterval(progressInterval);
            progress = 0;
            progressBar.style.width = '0%';
            holdHeart.style.transform = 'scale(1)';
            holdHeart.style.textShadow = '0 0 40px #ff00cc, 0 0 80px #ff1493';
        }

        // Mouse and Touch events for the Hold button
        holdBtn.addEventListener('mousedown', startHold);
        holdBtn.addEventListener('touchstart', startHold);
        holdBtn.addEventListener('mouseup', endHold);
        holdBtn.addEventListener('mouseleave', endHold);
        holdBtn.addEventListener('touchend', endHold);

        // Allow clicking anywhere on slide 4 to continue
        document.getElementById('slide4').addEventListener('click', nextSlide);

        // No Button Logic
        let noClickCount = 0;
        function clickNo() {
            noClickCount++;
            const yesBtn = document.getElementById('yesBtn');
            const noBtn = document.getElementById('noBtn');
            
            const scale = 1 + (noClickCount * 0.2);
            yesBtn.style.transform = `scale(${scale})`;
            
            const noMessages = ["Are you sure? 🥺", "Think again! 😢", "Please? 💔", "Okay, hiding this!"];
            
            if (noClickCount <= 3) {
                noBtn.innerText = noMessages[noClickCount - 1];
            } else {
                noBtn.style.display = "none"; 
            }
        }

        // CONFETTI BLAST FUNCTION
        function createBlast() {
            const colors = ['#ff00cc', '#ff69b4', '#ff1493', '#fff', '#ffd700'];
            for(let i=0; i<100; i++) {
                let confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.left = '50%';
                confetti.style.top = '50%';
                
                // Random shooting angles
                let angle = Math.random() * Math.PI * 2;
                let velocity = 100 + Math.random() * 200;
                let tx = Math.cos(angle) * velocity;
                let ty = Math.sin(angle) * velocity;
                
                confetti.style.transition = 'all 1s cubic-bezier(0.25, 1, 0.5, 1)';
                document.body.appendChild(confetti);
                
                // Animate outwards
                setTimeout(() => {
                    confetti.style.transform = `translate(${tx}px, ${ty}px) scale(0)`;
                    confetti.style.opacity = '0';
                }, 10);
                
                // Cleanup
                setTimeout(() => confetti.remove(), 1000);
            }
        }

        // Proposal YES Logic
        function blastAndSayYes() {
            createBlast(); // Trigger explosion
            setTimeout(() => {
                nextSlide(); // Go to "Finally she said yes"
            }, 800);
        }

        // Final Video Logic
        function openVideo() {
            document.getElementById('videoContainer').style.display = 'flex';
            const vid = document.getElementById('finalVideo');
            vid.play();
        }

        function closeVideo() {
            document.getElementById('videoContainer').style.display = 'none';
            document.getElementById('finalVideo').pause();
        }

        // Initialize
        window.onload = () => showSlide(1);
    </script>
</body>
</html>
