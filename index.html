<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Anshika ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Great+Vibes&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle, #1a001a, #000000); /* Dark Romantic Theme */
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            /* Animated Boundary Line */
            border: 8px solid;
            animation: borderColors 5s infinite linear;
        }

        @keyframes borderColors {
            0% { border-color: #ff0055; }
            25% { border-color: #9c27b0; }
            50% { border-color: #00e5ff; }
            75% { border-color: #ffeb3b; }
            100% { border-color: #ff0055; }
        }

        /* Top Handle Style - Now Clearly Visible */
        .top-handle {
            position: absolute;
            top: 25px;
            width: 100%;
            font-weight: 600;
            color: #ffffff; 
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
            z-index: 100;
            font-size: 1rem;
            letter-spacing: 2px;
        }

        .page {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease-in-out;
            z-index: 10;
        }

        .page.active {
            opacity: 1;
            visibility: visible;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 3rem;
            margin-bottom: 15px;
            color: #fff;
            text-shadow: 0 0 15px #ff69b4;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 30px;
            line-height: 1.5;
            max-width: 85%;
            color: #e0e0e0;
        }

        .gif-container {
            width: 220px;
            height: 220px;
            margin-bottom: 25px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.4);
        }

        .gif-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn {
            background: transparent;
            color: white;
            border: 2px solid #fff;
            padding: 12px 35px;
            font-size: 1rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            z-index: 20;
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        .btn:active {
            background: #fff;
            color: #000;
        }

        /* Background Elements */
        #bg-container {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .balloon {
            position: absolute;
            bottom: -150px;
            width: 80px;
            height: 100px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            color: white;
            animation: floatBalloon linear infinite;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.2);
        }

        @keyframes floatBalloon {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translateY(-120vh) rotate(20deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="top-handle">FOLLOW - @smss1708 🌺</div>

    <audio id="bg-music" loop>
        <source src="tere-liye.mp3" type="audio/mpeg">
    </audio>

    <div id="bg-container"></div>

    <div class="page active" id="page-1">
        <h1>Hi Anshika! ✨</h1>
        <p> I made a little website for your smile 😁...</p>
        <button class="btn" onclick="nextPage(1)">Click Here</button>
    </div>

    <div class="page" id="page-2">
        <div class="gif-container">
            <img src="flower1.gif" alt="Flower 1">
        </div>
        <p>It was really nice meeting you today! 🌸</p>
        <button class="btn" onclick="nextPage(2)">Next</button>
    </div>

    <div class="page" id="page-3">
        <div class="gif-container">
            <img src="flower2.gif" alt="Flower 2">
        </div>
        <p>I hope your day was as awesome as your vibe. 🌷</p>
        <button class="btn" onclick="nextPage(3)">One more</button>
    </div>

    <div class="page" id="page-4">
        <div class="gif-container">
            <img src="flower3.gif" alt="Flower 3">
        </div>
        <h1>Keep Smiling! 😊</h1>
        <p>Glad we became friends, Anshika. Have a great day 😘!</p>
    </div>

    <script>
        const bgMusic = document.getElementById('bg-music');

        function nextPage(current) {
            if (current === 1) {
                bgMusic.play().catch(() => console.log("Music needs interaction"));
            }
            
            document.getElementById(`page-${current}`).classList.remove('active');
            const next = document.getElementById(`page-${current + 1}`);
            if (next) {
                setTimeout(() => next.classList.add('active'), 100);
            }
        }

        function createElements() {
            const container = document.getElementById('bg-container');
            const colors = ['#ff4d6d', '#ff758f', '#c9184a', '#800f2f', '#ffb3c1'];
            
            // Balloons with "Anshika" text
            for (let i = 0; i < 10; i++) {
                let b = document.createElement('div');
                b.className = 'balloon';
                b.innerText = 'Anshika';
                b.style.left = Math.random() * 90 + 'vw';
                b.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                b.style.animationDuration = (Math.random() * 5 + 8) + 's';
                b.style.animationDelay = Math.random() * 10 + 's';
                container.appendChild(b);
            }

            // Floating hearts
            for (let i = 0; i < 10; i++) {
                let h = document.createElement('div');
                h.style.position = 'absolute';
                h.style.bottom = '-50px';
                h.style.left = Math.random() * 100 + 'vw';
                h.innerHTML = '❤️';
                h.style.fontSize = (Math.random() * 10 + 15) + 'px';
                h.style.animation = `floatBalloon ${Math.random() * 3 + 6}s linear infinite`;
                h.style.opacity = '0.5';
                container.appendChild(h);
            }
        }
        
        window.onload = createElements;
    </script>
</body>
</html>
